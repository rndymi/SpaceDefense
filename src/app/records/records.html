<div class="records-wrapper container py-5">
    <div class="records-card mx-auto">
        <h2 class="records-title mb-4">Records</h2>
        
        <hr class="config-divider">
        
        <table class="records-table">
            <thead>
                <tr>
                    <th></th>
                    <th>User</th>
                    <th>Points</th>
                    <th>UFOs</th>
                    <th>Secs.</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let score of scoresList$ | async; let i = index; let c = count"
                    [class.top1]="i === 0"
                    [class.top2]="i === 1"
                    [class.top3]="i === 2"
                    [class.last]="i === c - 1">
                    <td class="rank">#{{i + 1}}</td>
                    <td class="user">{{score.username}}</td>
                    <td class="points">{{score.punctuation}}</td>
                    <td class="ufos">{{score.ufos}}</td>
                    <td class="time">{{score.disposedTime}}</td>
                    <td class="date">{{score.recordDate | date : 'dd/MM/yyyy'}}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
