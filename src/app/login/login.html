<div *ngIf="!(auth$ | async)?.logged" class="login-wrapper container">
    <div class="login-card mx-auto">
        <h2 class="login-title">Identity User</h2>
        <p class="login-subtitle">Please enter your credentials to login.</p>

        <form (ngSubmit)="doLogin()" #loginForm="ngForm">
            <div class="login-field">
                <label class="login-label">Username:</label>
                <input type="text"
                       class="login-input"
                       name="username"
                       placeholder="e.g. user123"
                       required
                       autocomplete="username"
                       [(ngModel)]="username">
            </div>

            <div class="login-field">
                <label class="login-label">Password:</label>
                <input type="password"
                       class="login-input"
                       name="password"
                       placeholder="e.g. ********"
                       required
                       autocomplete="current-password"
                       [(ngModel)]="password">
            </div>

            <button type="submit" class="btn neon-btn-primary w-100 py-3 mt-3">
                Login
            </button>
        </form>
    </div>
</div>

<div *ngIf="(auth$ | async)?.logged" class="login-wrapper container">
    <div class="login-card mx-auto">
        <h2 class="login-title">👤 Welcome {{ (auth$ | async)?.username }}</h2>
        <p class="login-subtitle">
            Token expires in:
            <strong>{{ ((auth$ | async)?.tokenExpiresIn ?? 0) | authTime }}</strong>
        </p>

        <button class="btn neon-btn-danger w-100 py-3 mt-3" (click)="logout()">
            Logout
        </button>
    </div>
</div>

<div class="snackbar" #snackbar>
    <span class="snackbar-icon"></span>
    <span class="snackbar-message"></span>
</div>
