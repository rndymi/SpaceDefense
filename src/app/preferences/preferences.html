<div class="config-wrapper container py-5">
    <div class="config-card mx-auto">
        <div class="config-header d-flex justify-content-between align-items-center">
            <h2 class="config-title">Preferences</h2>
            <i class="bi bi-gear-fill config-icon"></i>
        </div>

        <hr class="config-divider">

        <form (ngSubmit)="savePreferences()" #preferencesForm="ngForm">
            <div class="config-row d-flex flex-column flex-md-row justify-content-between align-items-start mb-4">
                <div>
                    <label class="config-label">Entity Density (UFOs)</label>
                    <p class="config-desc">Number of simultaneous hostile targets.</p>
                </div>

                <div class="range-box d-flex align-items-center">
                    <input 
                        type="range" 
                        min="1" 
                        max="5" 
                        step="1" 
                        class="neon-range" 
                         name="ufos"
                        [(ngModel)]="ufos" 
                        (input)="updateRange($event)"
                    >
                    <span class="ufos-value ms-3">{{ ufos }}</span>
                </div>
            </div>

                <hr class="config-divider">

            <div class="config-row d-flex flex-column flex-md-row justify-content-between align-items-start mb-4">
                <div>
                    <label class="config-label">Simulation Duration</label>
                    <p class="config-desc">Time in seconds before auto-termination.</p>
                </div>

                <select class="neon-select w-auto" [(ngModel)]="timer" name="timer">
                    <option value="30">30s</option>
                    <option value="60">60s</option>
                    <option value="120">120s</option>
                </select>
            </div>

            <button type="submit" class="btn neon-btn-primary w-100 py-3 mt-3">
                Save Preferences
            </button>
        </form>
    </div>
</div>

<div class="snackbar" #snackbar>
    <span class="snack-icon"></span>
    <span class="snackbar-message"></span>
</div>
